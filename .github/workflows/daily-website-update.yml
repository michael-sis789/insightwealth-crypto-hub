name: Daily website data update

on:
  schedule:
    # 08:00 Malaysia time (UTC+8) every day.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update BTC prices
        run: npm run update:btc-prices

      - name: Update on-chain indicators
        run: npm run update:onchain
        continue-on-error: true

      - name: Refresh ETF daily marker
        run: npm run update:etf

      - name: Update market cache and bull score
        run: npm run update:daily-data

      - name: Update daily brief
        run: npm run update:daily-brief

      - name: Update YouTube latest video
        run: npm run update:youtube

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit updated website data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily website data"
          file_pattern: "data/*.json data/cache/*.json"
